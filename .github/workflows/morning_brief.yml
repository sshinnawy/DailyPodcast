name: Morning Brief - TTS & Publish

on:
  push:
    branches: [main]
    paths:
      - podcast_script.txt
  workflow_dispatch: {}

jobs:
  tts_and_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install edge-tts pydub httpx

      - name: Generate audio and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python tts_and_publish.py

      - name: Save script artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-script-${{ github.run_number }}
          path: podcast_script.txt
          retention-days: 30
